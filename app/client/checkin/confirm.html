<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Check-In Submitted</title>
    <link rel="stylesheet" href="/app/assets/css/tokens.css" />
    <link rel="stylesheet" href="/app/assets/css/app.css" />
  </head>
  <body class="app" data-role="client" data-active="today">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="app-main">
        <main class="center-screen">
          <span class="success-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
          </span>
          <h1 class="center-title">Check-in submitted</h1>
          <p class="center-sub">Nice work. Your coach will see this in today&rsquo;s digest.</p>
        </main>

        <div class="action-bar">
          <div class="action-bar-inner">
            <a class="btn btn-gradient btn-block" href="/app/client/home.html" data-nav>Back to Today</a>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { requireAuth } from "/app/assets/js/auth.js";
      import { mountAppShell } from "/app/assets/js/shell.js";

      await requireAuth("client");
      mountAppShell({ role: "client", active: "today" });
    </script>
  </body>
</html>
