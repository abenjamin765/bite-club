<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Plan</title>
    <link rel="stylesheet" href="/app/assets/css/tokens.css" />
    <link rel="stylesheet" href="/app/assets/css/app.css" />
  </head>
  <body class="app" data-role="client" data-active="plan">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="app-main">
        <header class="nav-bar">
          <div class="nav-bar-inner">
            <span class="nav-title">Plan</span>
          </div>
        </header>

        <main class="ios-scroll has-tabbar">
          <h1 class="large-title">Weekly plan</h1>
          <p class="large-title-sub" id="week-range">&nbsp;</p>

          <div class="list-group" id="status-banner-group" style="display: none">
            <div class="hero-card" id="status-banner" style="margin: 0">
              <div class="hero-eyebrow" id="status-eyebrow">Status</div>
              <div class="hero-title" id="status-title">Draft</div>
              <div class="hero-sub" id="status-sub"></div>
            </div>
          </div>

          <div class="list-group">
            <div class="list-header">Weekly totals (planned)</div>
            <div class="stat-group">
              <div class="stat"><div class="stat-value" id="tot-kcal">0</div><div class="stat-label">kcal</div></div>
              <div class="stat"><div class="stat-value" id="tot-protein">0g</div><div class="stat-label">Protein</div></div>
              <div class="stat"><div class="stat-value" id="tot-carbs">0g</div><div class="stat-label">Carbs</div></div>
              <div class="stat"><div class="stat-value" id="tot-fat">0g</div><div class="stat-label">Fat</div></div>
            </div>
          </div>

          <div class="list-group">
            <div class="list-header">Days</div>
            <div class="list" id="day-list"></div>
            <p class="list-footer" id="status-footer"></p>
          </div>

          <div class="list-group" id="submit-group" style="display: none">
            <button class="btn btn-gradient btn-block" id="submit-plan">Submit for Approval</button>
            <p class="action-hint" id="submit-hint" style="margin-top: 8px"></p>
          </div>
        </main>

        <nav class="tab-bar" id="app-tabbar"></nav>
      </div>
    </div>

    <script type="module">
      import { requireAuth, getProfile } from "/app/assets/js/auth.js";
      import { mountAppShell } from "/app/assets/js/shell.js";
      import { bindNavLinks } from "/app/assets/js/router.js";
      import {
        getMyGroup,
        getOrCreateCurrentPlan,
        getPlanBuilder,
        submitPlan,
        rememberDemoUser,
      } from "/app/assets/js/data.js";
      import { formatDateRange, formatKcal, formatGrams, escapeHtml } from "/app/assets/js/utils.js";

      const session = await requireAuth("client");
      mountAppShell({ role: "client", active: "plan", mobileTabs: true });
      if (!session) throw new Error("no session");

      const profile = await getProfile(session.user.id);
      rememberDemoUser({ id: session.user.id, name: profile?.name, role: "client", email: session.user.email });

      const group = await getMyGroup(session.user.id, "client");
      if (!group) {
        window.location.replace("/app/client/join.html");
        throw new Error("no group");
      }

      const chevron =
        '<svg class="row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

      const plan = await getOrCreateCurrentPlan(session.user.id, group.id);
      const view = await getPlanBuilder(plan);

      document.querySelector("#week-range").textContent =
        "Week of " + formatDateRange(plan.week_start, plan.week_end);

      document.querySelector("#tot-kcal").textContent = formatKcal(view.weekTotals.calories);
      document.querySelector("#tot-protein").textContent = formatGrams(view.weekTotals.protein) + "g";
      document.querySelector("#tot-carbs").textContent = formatGrams(view.weekTotals.carbs) + "g";
      document.querySelector("#tot-fat").textContent = formatGrams(view.weekTotals.fat) + "g";

      const dayRow = (day) => {
        const count = day.meals.length;
        let sub;
        let subStyle = "";
        if (!count) {
          sub = view.editable ? "Add meals" : "No meals";
          subStyle = ' style="color: var(--ios-tint)"';
        } else {
          sub = `${count} ${count === 1 ? "meal" : "meals"} · ${formatKcal(day.totals.calories)} kcal`;
        }
        const todayPill = day.isToday ? '<span class="pill is-tint">Today</span>' : "";
        return `
          <a class="row is-tappable" href="/app/client/plan/day.html?date=${day.date}" data-nav>
            <span class="row-main">
              <span class="row-title is-strong">${escapeHtml(day.dowLong)}</span>
              <span class="row-sub"${subStyle}>${escapeHtml(sub)}</span>
            </span>
            ${todayPill}
            ${chevron}
          </a>`;
      };

      document.querySelector("#day-list").innerHTML = view.days.map(dayRow).join("");
      bindNavLinks();

      // Status + submission surface driven by real plan state.
      const bannerGroup = document.querySelector("#status-banner-group");
      const submitGroup = document.querySelector("#submit-group");
      const footer = document.querySelector("#status-footer");
      const submitBtn = document.querySelector("#submit-plan");
      const submitHint = document.querySelector("#submit-hint");

      function showBanner(eyebrow, title, sub) {
        document.querySelector("#status-eyebrow").textContent = eyebrow;
        document.querySelector("#status-title").textContent = title;
        document.querySelector("#status-sub").textContent = sub;
        bannerGroup.style.display = "";
      }

      const status = plan.status || "draft";

      if (status === "submitted") {
        showBanner("Submitted", "Awaiting coach review", "Your coach will approve this plan or request changes. You’ll be notified either way.");
        footer.textContent = "This plan is locked while your coach reviews it.";
      } else if (status === "approved" || status === "active") {
        showBanner("Approved", "Plan approved", "This plan is now the source for your daily check-ins.");
        footer.textContent = "Your approved plan is read-only. Check in from the Today tab.";
      } else {
        // draft or needs_changes → editable
        if (status === "needs_changes") {
          showBanner("Changes requested", "Your coach asked for changes", "Update your meals below, then resubmit.");
        }
        submitGroup.style.display = "";
        if (view.completeness.complete) {
          submitBtn.disabled = false;
          submitHint.textContent =
            status === "needs_changes" ? "Ready to resubmit." : "Ready to submit to your coach.";
          footer.textContent = `${view.mealCount} ${view.mealCount === 1 ? "meal" : "meals"} across ${view.dayCount} ${view.dayCount === 1 ? "day" : "days"}.`;
        } else {
          submitBtn.disabled = true;
          submitBtn.textContent = status === "needs_changes" ? "Resubmit for Approval" : "Submit for Approval";
          submitHint.textContent = view.completeness.issues[0] || "Add meals with ingredients to submit.";
          footer.textContent = "Every meal needs at least one ingredient before you can submit.";
        }
      }

      submitBtn.addEventListener("click", async () => {
        submitBtn.disabled = true;
        submitHint.textContent = "Submitting…";
        const { error } = await submitPlan({
          clientId: session.user.id,
          groupId: group.id,
          weekStart: plan.week_start,
          weekEnd: plan.week_end,
        });
        if (error) {
          submitHint.textContent = error.message || "Could not submit. Try again.";
          submitBtn.disabled = false;
          return;
        }
        window.location.reload();
      });
    </script>
  </body>
</html>
