<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Group</title>
    <link rel="stylesheet" href="/app/assets/css/tokens.css" />
    <link rel="stylesheet" href="/app/assets/css/app.css" />
  </head>
  <body class="app" data-role="coach" data-active="group">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="app-main">
        <header class="nav-bar">
          <div class="nav-bar-inner">
            <span class="nav-title">Group</span>
          </div>
        </header>

        <main class="ios-scroll has-tabbar">
          <!-- Populated state: one card per group, members nested inside. -->
          <div id="has-group" class="stack-12" style="display: none; margin-top: 12px"></div>

          <!-- Empty state: create the first group. -->
          <div id="no-group" style="display: none">
            <h1 class="large-title">Create a group</h1>
            <p class="large-title-sub">Set up your program, then invite clients with a code.</p>
            <div class="list-group">
              <div class="list">
                <div class="field-row">
                  <label for="group-name">Name</label>
                  <input class="field-input" id="group-name" placeholder="e.g. Greenfield Group" autocomplete="off" />
                </div>
              </div>
              <div style="padding: 12px 16px 0">
                <button class="btn btn-gradient btn-block" id="create-group" type="button">Create group</button>
                <p class="helper-text" id="create-message" aria-live="polite"></p>
              </div>
              <p class="list-footer">Clients join instantly with the invite code we generate for you.</p>
            </div>
          </div>
        </main>

        <nav class="tab-bar" id="app-tabbar"></nav>
      </div>
    </div>

    <script type="module">
      import { requireAuth, getProfile } from "/app/assets/js/auth.js";
      import { mountAppShell } from "/app/assets/js/shell.js";
      import { bindNavLinks } from "/app/assets/js/router.js";
      import { getCoachGroups, createGroup, getGroupRoster, rememberDemoUser } from "/app/assets/js/data.js";
      import { escapeHtml, initials } from "/app/assets/js/utils.js";

      const session = await requireAuth("coach");
      mountAppShell({ role: "coach", active: "group", mobileTabs: true });
      if (!session) throw new Error("no session");

      const profile = await getProfile(session.user.id);
      rememberDemoUser({ id: session.user.id, name: profile?.name, role: "coach", email: session.user.email });

      const hasGroup = document.querySelector("#has-group");
      const noGroup = document.querySelector("#no-group");

      const chevron =
        '<svg class="row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

      function membersHtml(roster) {
        if (!roster.length) {
          return `<div class="group-card__members">
            <div class="members-head">Members</div>
            <p class="group-card__empty">No clients yet — share the invite code above to add them.</p>
          </div>`;
        }
        const rows = roster
          .map(
            (m) => `
            <a class="member-row" href="${m.href}" data-nav>
              <span class="member-avatar" aria-hidden="true">${escapeHtml(initials(m.name))}</span>
              <span class="row-main">
                <span class="row-title is-strong">${escapeHtml(m.name || "Client")}</span>
                <span class="row-sub">${escapeHtml(m.sub)}</span>
              </span>
              <span class="pill ${escapeHtml(m.pillClass)}">${escapeHtml(m.pill)}</span>
              ${chevron}
            </a>`
          )
          .join("");
        return `<div class="group-card__members">
          <div class="members-head">Members</div>
          ${rows}
        </div>`;
      }

      async function groupCardHtml(group) {
        const roster = await getGroupRoster(group.id);
        const count = roster.length;
        return `
          <article class="group-card group-instance" data-group-id="${escapeHtml(group.id)}">
            <div class="group-card__head">
              <h1 class="group-card__name">${escapeHtml(group.name)}</h1>
              <span class="group-card__count">${count} ${count === 1 ? "member" : "members"}</span>
            </div>
            <div class="invite-box">
              <div class="invite-label">Invite code</div>
              <div class="invite-row">
                <span class="invite-code" data-invite-code>${escapeHtml(group.invite_code)}</span>
                <button class="btn btn-tinted invite-copy" type="button" data-copy-code>Copy</button>
              </div>
              <p class="invite-hint">Share this code so clients can join this group.</p>
            </div>
            ${membersHtml(roster)}
          </article>`;
      }

      async function render() {
        const groups = await getCoachGroups(session.user.id);
        if (!groups.length) {
          noGroup.style.display = "";
          hasGroup.style.display = "none";
          hasGroup.innerHTML = "";
          bindNavLinks();
          return;
        }
        noGroup.style.display = "none";
        hasGroup.style.display = "";
        const cards = await Promise.all(groups.map((g) => groupCardHtml(g)));
        hasGroup.innerHTML = cards.join("");
        bindNavLinks();
      }

      // Copy invite code (event-delegated across group cards).
      hasGroup.addEventListener("click", async (event) => {
        const copyBtn = event.target.closest("[data-copy-code]");
        if (!copyBtn) return;
        const card = copyBtn.closest(".group-instance");
        const code = card?.querySelector("[data-invite-code]")?.textContent?.trim();
        if (!code) return;
        try {
          await navigator.clipboard.writeText(code);
          copyBtn.textContent = "Copied";
          setTimeout(() => (copyBtn.textContent = "Copy"), 1500);
        } catch {
          /* clipboard unavailable */
        }
      });

      // Create group (empty state only).
      const createBtn = document.querySelector("#create-group");
      const nameInput = document.querySelector("#group-name");
      const createMessage = document.querySelector("#create-message");
      createBtn.addEventListener("click", async () => {
        const name = nameInput.value.trim();
        if (!name) {
          createMessage.textContent = "Give your group a name first.";
          createMessage.classList.add("is-error");
          return;
        }
        createBtn.disabled = true;
        createMessage.classList.remove("is-error");
        createMessage.textContent = "Creating…";
        const { error } = await createGroup(name, session.user.id);
        if (error) {
          createMessage.textContent = error.message || "Could not create the group.";
          createMessage.classList.add("is-error");
          createBtn.disabled = false;
          return;
        }
        nameInput.value = "";
        createMessage.textContent = "";
        await render();
      });

      await render();
    </script>
  </body>
</html>
