<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Daily Digest</title>
    <link rel="stylesheet" href="/app/assets/css/tokens.css" />
    <link rel="stylesheet" href="/app/assets/css/app.css" />
  </head>
  <body class="app" data-role="coach" data-active="dashboard" data-layout="board">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="app-main">
      <header class="nav-bar">
        <div class="nav-bar-inner">
          <span class="nav-leading">
            <a class="nav-btn" href="/app/coach/home.html" data-nav>
              <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
              Dashboard
            </a>
          </span>
          <span class="nav-title">Daily Digest</span>
        </div>
      </header>

      <main class="ios-scroll has-tabbar">
        <h1 class="large-title">Daily Digest</h1>
        <p class="large-title-sub" id="digest-date">Today</p>

        <div class="list-group">
          <div class="list-header">Clients</div>
          <div class="stat-group" style="grid-template-columns: repeat(3, 1fr)">
            <div class="stat"><div class="stat-value" id="count-followed" style="color: var(--ios-green)">0</div><div class="stat-label">Followed</div></div>
            <div class="stat"><div class="stat-value" id="count-deviated" style="color: var(--ios-orange)">0</div><div class="stat-label">Deviated</div></div>
            <div class="stat"><div class="stat-value" id="count-missed" style="color: var(--ios-red)">0</div><div class="stat-label">Missed</div></div>
          </div>
          <p class="list-footer" id="participation">0 of 0 checked in.</p>
        </div>

        <div class="list-group" id="breakdown-group" style="display: none">
          <div class="list-header">Meals reported</div>
          <div class="stat-group" style="grid-template-columns: repeat(3, 1fr)">
            <div class="stat"><div class="stat-value" id="meal-followed">0</div><div class="stat-label">Followed</div></div>
            <div class="stat"><div class="stat-value" id="meal-modified">0</div><div class="stat-label">Modified</div></div>
            <div class="stat"><div class="stat-value" id="meal-skipped">0</div><div class="stat-label">Skipped</div></div>
          </div>
        </div>

        <div class="list-group" id="attention-group" style="display: none">
          <div class="list-header">Needs attention</div>
          <div class="list" id="attention-list"></div>
        </div>

        <div class="list-group" id="ontrack-group" style="display: none">
          <div class="list-header">On track</div>
          <div class="list" id="ontrack-list"></div>
        </div>

        <div class="list-group" id="empty-state" style="display: none">
          <p class="list-footer" id="empty-text"></p>
        </div>
      </main>

      <nav class="tab-bar" id="app-tabbar"></nav>
      </div>
    </div>

    <script type="module">
      import { requireAuth } from "/app/assets/js/auth.js";
      import { mountAppShell } from "/app/assets/js/shell.js";
      import { bindNavLinks } from "/app/assets/js/router.js";
      import { getMyGroup, getDigest } from "/app/assets/js/data.js";
      import { escapeHtml } from "/app/assets/js/utils.js";

      const session = await requireAuth("coach");
      mountAppShell({ role: "coach", active: "dashboard", mobileTabs: true });
      if (!session) throw new Error("no session");

      document.querySelector("#digest-date").textContent = new Intl.DateTimeFormat("en-US", {
        weekday: "long",
        month: "short",
        day: "numeric",
      }).format(new Date());

      const ICONS = {
        deviated:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 9v4m0 4h.01M10.615 3.892 2.39 18.098c-.456.788-.684 1.182-.65 1.506a1 1 0 0 0 .406.705c.263.191.718.191 1.629.191h16.45c.91 0 1.365 0 1.628-.191a1 1 0 0 0 .407-.705c.034-.324-.195-.718-.65-1.506L13.383 3.892c-.454-.785-.681-1.178-.978-1.31a1 1 0 0 0-.813 0c-.296.132-.523.525-.978 1.31Z"/></svg>',
        missed:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 6v6l4 2m6-2c0 5.523-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2s10 4.477 10 10Z"/></svg>',
        followed:
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>',
      };
      const iconTone = { deviated: "is-orange", missed: "is-red", followed: "is-green" };
      const pill = {
        deviated: '<span class="pill is-orange">Deviated</span>',
        missed: '<span class="pill is-red">Missed</span>',
        followed: '<span class="pill is-green">Followed</span>',
      };
      const chevron =
        '<svg class="row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

      function checkinHref(clientId) {
        return `/app/coach/checkin.html?client=${encodeURIComponent(clientId)}&from=digest`;
      }

      function attentionRow(item) {
        return `
          <a class="row is-tappable" href="${checkinHref(item.id)}" data-nav>
            <span class="row-icon ${iconTone[item.status]}" aria-hidden="true">${ICONS[item.status]}</span>
            <span class="row-main">
              <span class="row-title is-strong">${escapeHtml(item.name)}</span>
              <span class="row-sub">${escapeHtml(item.summary)}</span>
            </span>
            ${pill[item.status]}
            ${chevron}
          </a>`;
      }

      function onTrackRow(item) {
        return `
          <a class="row is-tappable" href="${checkinHref(item.id)}" data-nav>
            <span class="row-icon is-green" aria-hidden="true">${ICONS.followed}</span>
            <span class="row-main"><span class="row-title">${escapeHtml(item.name)}</span></span>
            ${pill.followed}
            ${chevron}
          </a>`;
      }

      const group = await getMyGroup(session.user.id, "coach");
      if (!group) {
        document.querySelector("#empty-state").style.display = "";
        document.querySelector("#empty-text").innerHTML =
          'Set up your group first. <a href="/app/coach/group.html" data-nav>Create a group</a>.';
        bindNavLinks();
      } else {
        const { counts, breakdown, attention, onTrack, totalMembers } = await getDigest(group.id);
        document.querySelector("#count-followed").textContent = counts.followed;
        document.querySelector("#count-deviated").textContent = counts.deviated;
        document.querySelector("#count-missed").textContent = counts.missed;

        const checkedIn = counts.followed + counts.deviated;
        document.querySelector("#participation").textContent =
          `${checkedIn} of ${totalMembers} checked in.`;

        const mealTotal = breakdown.followed + breakdown.modified + breakdown.skipped;
        if (mealTotal > 0) {
          document.querySelector("#breakdown-group").style.display = "";
          document.querySelector("#meal-followed").textContent = breakdown.followed;
          document.querySelector("#meal-modified").textContent = breakdown.modified;
          document.querySelector("#meal-skipped").textContent = breakdown.skipped;
        }

        if (totalMembers === 0) {
          document.querySelector("#empty-state").style.display = "";
          document.querySelector("#empty-text").innerHTML =
            'No clients yet. <a href="/app/coach/group.html" data-nav>Share your invite code</a> to add them.';
        } else {
          if (attention.length) {
            document.querySelector("#attention-group").style.display = "";
            document.querySelector("#attention-list").innerHTML = attention.map(attentionRow).join("");
          }
          if (onTrack.length) {
            document.querySelector("#ontrack-group").style.display = "";
            document.querySelector("#ontrack-list").innerHTML = onTrack.map(onTrackRow).join("");
          }
          if (!attention.length && !onTrack.length) {
            document.querySelector("#empty-state").style.display = "";
            document.querySelector("#empty-text").textContent = "No check-ins submitted yet today.";
          }
        }
        bindNavLinks();
      }
    </script>
  </body>
</html>
