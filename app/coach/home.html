<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/app/assets/css/tokens.css" />
    <link rel="stylesheet" href="/app/assets/css/app.css" />
  </head>
  <body class="app" data-role="coach" data-active="dashboard" data-layout="board">
    <div class="app-shell">
      <aside class="app-sidebar" id="app-sidebar"></aside>
      <div class="app-main">
      <header class="nav-bar">
        <div class="nav-bar-inner">
          <span class="nav-title">Dashboard</span>
        </div>
      </header>

      <main class="ios-scroll has-tabbar">
        <h1 class="large-title">Dashboard</h1>
        <p class="large-title-sub" id="group-meta">Loading…</p>

        <div class="hero-card with-ring">
          <div>
            <div class="hero-eyebrow">Today</div>
            <div class="hero-title" id="ontrack-headline">No check-ins yet</div>
            <div class="hero-sub">Review submitted plans and check in on clients who need attention.</div>
          </div>
          <div class="ring" id="ontrack-ring" style="--percent: 0">
            <span class="ring-center" id="ontrack-ring-text">0%</span>
          </div>
        </div>

        <div class="list-group">
          <div class="list-header">Today at a glance</div>
          <div class="stat-group" style="grid-template-columns: repeat(3, 1fr)">
            <div class="stat"><div class="stat-value" id="count-followed" style="color: var(--ios-green)">0</div><div class="stat-label">Followed</div></div>
            <div class="stat"><div class="stat-value" id="count-deviated" style="color: var(--ios-orange)">0</div><div class="stat-label">Deviated</div></div>
            <div class="stat"><div class="stat-value" id="count-missed" style="color: var(--ios-red)">0</div><div class="stat-label">Missed</div></div>
          </div>
        </div>

        <div class="list-group">
          <div class="list-header">Plans awaiting review</div>
          <div class="list" id="review-list"></div>
          <p class="list-footer" id="review-empty" style="display: none">No plans awaiting review.</p>
        </div>

        <div class="list-group" id="attention-group" style="display: none">
          <div class="list-header">Needs attention</div>
          <div class="list" id="attention-list"></div>
        </div>

        <div class="list-group">
          <div class="list">
            <a class="row is-tappable" href="/app/coach/digest.html" data-nav>
              <span class="row-icon is-gray" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12H9m12-6H9m12 12H9m-4-6a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm0-6a1 1 0 1 1-2 0 1 1 0 0 1 2 0Zm0 12a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>
              </span>
              <span class="row-main">
                <span class="row-title is-strong">Full daily digest</span>
                <span class="row-sub">Complete adherence breakdown</span>
              </span>
              <svg class="row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
            </a>
          </div>
        </div>
      </main>

      <nav class="tab-bar" id="app-tabbar"></nav>
      </div>
    </div>

    <script type="module">
      import { requireAuth, getProfile } from "/app/assets/js/auth.js";
      import { mountAppShell } from "/app/assets/js/shell.js";
      import { bindNavLinks } from "/app/assets/js/router.js";
      import { getMyGroup, getDigest, getSubmittedPlans, getGroupMembers, rememberDemoUser } from "/app/assets/js/data.js";
      import { escapeHtml, initials } from "/app/assets/js/utils.js";

      const session = await requireAuth("coach");
      mountAppShell({ role: "coach", active: "dashboard", mobileTabs: true });
      if (!session) throw new Error("no session");

      const profile = await getProfile(session.user.id);
      rememberDemoUser({ id: session.user.id, name: profile?.name, role: "coach", email: session.user.email });

      function timeAgo(iso) {
        if (!iso) return "Submitted";
        const mins = Math.max(1, Math.round((Date.now() - new Date(iso).getTime()) / 60000));
        if (mins < 60) return `Submitted ${mins}m ago`;
        const hrs = Math.round(mins / 60);
        if (hrs < 24) return `Submitted ${hrs}h ago`;
        return `Submitted ${Math.round(hrs / 24)}d ago`;
      }
      const attentionPill = {
        deviated: '<span class="pill is-orange">Deviated</span>',
        missed: '<span class="pill is-red">Missed</span>',
      };
      const chevron =
        '<svg class="row-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>';

      const group = await getMyGroup(session.user.id, "coach");
      if (!group) {
        window.location.replace("/app/coach/group.html");
        throw new Error("no group");
      }

      const members = await getGroupMembers(group.id);
      document.querySelector("#group-meta").textContent =
        `${group.name} · ${members.length} ${members.length === 1 ? "client" : "clients"}`;

      const { counts, attention, totalMembers } = await getDigest(group.id);
      document.querySelector("#count-followed").textContent = counts.followed;
      document.querySelector("#count-deviated").textContent = counts.deviated;
      document.querySelector("#count-missed").textContent = counts.missed;

      const submittedTotal = counts.followed + counts.deviated + counts.missed;
      if (submittedTotal > 0 && (counts.followed + counts.deviated) > 0) {
        const pct = Math.round((counts.followed / totalMembers) * 100);
        document.querySelector("#ontrack-ring").style.setProperty("--percent", String(pct));
        document.querySelector("#ontrack-ring-text").textContent = `${pct}%`;
        document.querySelector("#ontrack-headline").textContent = `${pct}% on track today`;
      }

      // Plans awaiting review.
      const queue = await getSubmittedPlans(group.id);
      const list = document.querySelector("#review-list");
      const reviewEmpty = document.querySelector("#review-empty");
      if (!queue.length) {
        reviewEmpty.style.display = "";
      } else {
        list.innerHTML = queue
          .map(
            (plan, index) => `
            <a class="row is-tappable" href="/app/coach/plan-review.html?plan=${encodeURIComponent(plan.id)}" data-nav>
              <span class="avatar" aria-hidden="true">${escapeHtml(initials(plan.client?.name || "Client"))}</span>
              <span class="row-main">
                <span class="row-title is-strong">${escapeHtml(plan.client?.name || "Client")}</span>
                <span class="row-sub">${escapeHtml(timeAgo(plan.submitted_at))}</span>
              </span>
              ${index === 0 ? '<span class="pill is-tint">New</span>' : ""}
              ${chevron}
            </a>`
          )
          .join("");
      }

      // Clients needing attention (missed or deviated).
      const attentionGroup = document.querySelector("#attention-group");
      const attentionList = document.querySelector("#attention-list");
      if (attention.length) {
        attentionGroup.style.display = "";
        attentionList.innerHTML = attention
          .map(
            (item) => `
            <a class="row is-tappable" href="/app/coach/checkin.html?client=${encodeURIComponent(item.id)}&from=dashboard" data-nav>
              <span class="avatar" aria-hidden="true">${escapeHtml(initials(item.name))}</span>
              <span class="row-main">
                <span class="row-title is-strong">${escapeHtml(item.name)}</span>
                <span class="row-sub">${escapeHtml(item.summary)}</span>
              </span>
              ${attentionPill[item.status] || ""}
              ${chevron}
            </a>`
          )
          .join("");
      }

      bindNavLinks();
    </script>
  </body>
</html>
